master:
  host: "127.0.0.1"
  http_port: 4000
  tcp_port: 5000
  ws_port: 6000
  heartbeat_interval: 5000  
  lock_timeout: 3000
  chunk_size: 4
  replication_factor: 3
  read_quorum: 2
  write_quorum: 2

slaveDataNodes:
  - host: "127.0.0.1"
    port: 6001
  - host: "127.0.0.1"
    port: 6002
  - host: "127.0.0.1"
    port: 6003

backupNodes:
  - host: "127.0.0.1"
    port: 5001
  - host: "127.0.0.1"
    port: 5002

# ─────────────────────────────────────────────────────────────
# Pipeline Microservice (Python · LZW → AES-256-GCM → Base64)
# ─────────────────────────────────────────────────────────────
# enabled      : set to true to run all file content through the pipeline
#                before chunking (upload) and after merging (download).
#                false = content is stored/retrieved as-is.
# service_url  : base URL of the running Python pipeline-service.
# port         : port the Python service listens on (used by run.bat / run.sh).
# aes_key_hex  : 64-char hex string = 32 raw bytes = AES-256 key.
#                CHANGE THIS before any production deployment.
pipeline:
  enabled: true
  service_url: "http://localhost:8000"
  port: 8000
  aes_key_hex: "476f44726976655069706c696e652d5365637265744b65792d3230323521213232"